services:
  mt5-local-copier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-local-copier
    ports:
      - "8080:8080"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - mt5_config:/data/config
      - mt5_logs:/data/logs
      - mt5_data:/data/mt5
    restart: unless-stopped

volumes:
  mt5_config:
  mt5_logs:
  mt5_data:
