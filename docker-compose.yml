services:
  mt5-local-copier:
    image: ghcr.io/drajabr/mt5-local-copier:${IMAGE_TAG:-main}
    command: ["bash", "-lc", "Xvfb :99 -screen 0 1024x768x24 & /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000}"]
    container_name: mt5-local-copier
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - mt5_config:/data/config
      - mt5_logs:/data/logs
      - mt5_data:/data/mt5
    restart: unless-stopped

volumes:
  mt5_config:
  mt5_logs:
  mt5_data:
